<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator Template - ToolMitra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 font-sans p-4 md:p-8">
    <div class="max-w-md mx-auto bg-white p-8 rounded-xl border border-gray-200 shadow-sm">
        <h2 id="toolTitle" class="text-2xl font-bold text-gray-800 mb-6 text-center">Tool Name</h2>
        <div id="inputs" class="space-y-4">
            </div>
        <button id="calcBtn" class="w-full mt-6 bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-lg transition">Calculate</button>
        
        <div id="result" class="mt-6 p-4 bg-blue-50 rounded-lg text-center hidden">
            <p class="text-sm font-bold text-blue-600 mb-1">Result</p>
            <p id="outputValue" class="text-3xl font-bold text-blue-900">0</p>
        </div>
    </div>
</body>
</html>
