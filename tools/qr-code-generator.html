<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator - ToolMitra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { background-color: #f8f9fa; }
        .tab-active { border-bottom: 2px solid #6366f1; color: #6366f1; }
        .upload-area { border: 2px dashed #d1d5db; transition: all 0.3s ease; }
        .upload-area.dragover { border-color: #6366f1; background-color: #eef2ff; }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col">

    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-[1400px] mx-auto px-4 h-16 flex justify-between items-center">
            <a href="../index.html" class="flex items-center gap-2"><i class="fas fa-heart text-[#e5322d] text-2xl"></i> <span class="font-bold text-2xl">ToolMitra</span></a>
            <a href="../index.html" class="text-sm font-bold text-gray-600 hover:text-indigo-600"><i class="fas fa-arrow-left"></i> Back</a>
        </div>
    </nav>

    <div class="bg-indigo-50 border-b border-indigo-100 pt-10 pb-8 text-center">
        <h1 class="text-[32px] font-bold text-gray-900 mb-2">QR Code Generator</h1>
        <p class="text-gray-600">Create custom QR codes for text, URLs, or files.</p>
    </div>

    <main class="flex-grow py-8 px-4">
        <div class="max-w-xl mx-auto bg-white p-8 rounded-xl border border-gray-200 shadow-sm">
            
            <div class="flex border-b mb-6">
                <button id="tabText" onclick="switchTab('text')" class="flex-1 py-3 font-bold tab-active">Text / URL</button>
                <button id="tabFile" onclick="switchTab('file')" class="flex-1 py-3 font-bold text-gray-400">Upload File</button>
            </div>

            <div id="textInputDiv">
                <label class="block text-xs font-bold uppercase mb-2">Enter Content</label>
                <textarea id="qrText" class="w-full border-2 border-gray-200 rounded-lg p-3 h-32 mb-6" placeholder="Type here..."></textarea>
            </div>

            <div id="fileInputDiv" class="hidden">
                <label class="block text-xs font-bold uppercase mb-2">Select File</label>
                <div id="dropZone" class="upload-area rounded-xl p-6 text-center cursor-pointer mb-2" onclick="document.getElementById('fileUpload').click()">
                    <i class="fas fa-file-upload text-3xl text-gray-400 mb-2"></i>
                    <p class="text-sm text-gray-500" id="fileName">Click to select file</p>
                </div>
                <input type="file" id="fileUpload" class="hidden" onchange="updateFileName(this)">
                <p id="sizeWarning" class="text-[10px] text-amber-600 font-bold mb-4 hidden">⚠️ Large files will generate unreadable QR codes.</p>
            </div>
            
            <button onclick="generateQR()" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-lg shadow-lg hover:bg-indigo-700">
                <i class="fas fa-qrcode mr-2"></i> Generate QR Code
            </button>

            <div id="resultSection" class="hidden mt-8 text-center border-t pt-8">
                <div id="qrCodeArea" class="inline-block p-4 bg-white border border-gray-200 rounded-lg"></div>
                <button onclick="downloadQR()" class="mt-6 block w-full bg-green-600 text-white font-bold py-3 rounded-lg">Download QR</button>
            </div>
        </div>
    </main>

    <script>
        let qrcode = new QRCode(document.getElementById("qrCodeArea"), { width: 256, height: 256 });
        let activeTab = 'text';

        function switchTab(tab) {
            activeTab = tab;
            document.getElementById('tabText').className = tab === 'text' ? 'flex-1 py-3 font-bold tab-active' : 'flex-1 py-3 font-bold text-gray-400';
            document.getElementById('tabFile').className = tab === 'file' ? 'flex-1 py-3 font-bold tab-active' : 'flex-1 py-3 font-bold text-gray-400';
            document.getElementById('textInputDiv').classList.toggle('hidden', tab !== 'text');
            document.getElementById('fileInputDiv').classList.toggle('hidden', tab !== 'file');
        }

        function updateFileName(input) {
            if(input.files.length > 0) {
                document.getElementById('fileName').innerText = input.files[0].name;
                if(input.files[0].size > 2048) document.getElementById('sizeWarning').classList.remove('hidden');
                else document.getElementById('sizeWarning').classList.add('hidden');
            }
        }

        async function generateQR() {
            let data = "";
            if (activeTab === 'text') {
                data = document.getElementById('qrText').value;
            } else {
                const file = document.getElementById('fileUpload').files[0];
                if (!file) return alert("Select a file");
                
                const reader = new FileReader();
                reader.onload = (e) => {
                    data = e.target.result;
                    qrcode.makeCode(data);
                    document.getElementById('resultSection').classList.remove('hidden');
                };
                reader.readAsDataURL(file);
                return;
            }

            if(!data) return alert("Please enter something!");
            qrcode.makeCode(data);
            document.getElementById('resultSection').classList.remove('hidden');
        }

        function downloadQR() {
            const img = document.querySelector("#qrCodeArea img");
            const a = document.createElement("a");
            a.href = img.src;
            a.download = "ToolMitra_QR.png";
            a.click();
        }
    </script>
</body>
</html>
