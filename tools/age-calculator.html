<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Calculator - ToolMitra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-8">
    <div class="max-w-md mx-auto bg-white p-8 rounded-xl border border-gray-200 shadow-sm">
        <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center"><i class="fas fa-birthday-cake text-pink-600 mr-2"></i> Age Calculator</h2>
        
        <label class="block text-sm font-bold text-gray-700 mb-1">Date of Birth</label>
        <input type="date" id="dob" class="w-full p-3 border-2 border-gray-200 rounded-lg mb-6 outline-none">

        <button onclick="calculateAge()" class="w-full bg-pink-600 hover:bg-pink-700 text-white font-bold py-4 rounded-lg transition">Calculate Age</button>

        <div id="result" class="mt-6 p-4 bg-pink-50 rounded-lg text-center hidden">
            <p id="ageOutput" class="text-xl font-bold text-pink-900"></p>
        </div>
    </div>

    <script>
        function calculateAge() {
            const dob = new Date(document.getElementById('dob').value);
            const today = new Date();
            let age = today.getFullYear() - dob.getFullYear();
            const monthDiff = today.getMonth() - dob.getMonth();
            if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < dob.getDate())) age--;
            
            document.getElementById('ageOutput').innerText = `You are ${age} years old.`;
            document.getElementById('result').classList.remove('hidden');
        }
    </script>
</body>
</html>
