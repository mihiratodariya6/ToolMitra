<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watermark PDF - ToolMitra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { brandIndigo: '#6366f1' }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f8f9fa; color: #333333; }
        .upload-area { border: 2px dashed #d1d5db; transition: all 0.3s ease; }
        .upload-area.dragover { border-color: #6366f1; background-color: #eef2ff; }
        #canvasPreview { border: 1px solid #e5e7eb; border-radius: 8px; width: 100%; height: auto; background: #f9fafb; }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col">

    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-[1400px] mx-auto px-4 h-16 flex justify-between items-center">
            <a href="../index.html" class="flex items-center gap-2 hover:opacity-80 transition">
                <i class="fas fa-heart text-[#e5322d] text-2xl"></i>
                <span class="font-bold text-2xl tracking-tight text-gray-900">ToolMitra</span>
            </a>
            <a href="../index.html" class="text-sm font-semibold text-gray-600 hover:text-brandIndigo flex items-center gap-2">
                <i class="fas fa-arrow-left"></i> Back to All Tools
            </a>
        </div>
    </nav>

    <div class="bg-indigo-50 border-b border-indigo-100 pt-10 pb-8">
        <div class="max-w-4xl mx-auto text-center px-4">
            <div class="w-16 h-16 mx-auto bg-white text-brandIndigo rounded-2xl flex items-center justify-center text-3xl mb-4 shadow-sm border border-indigo-100">
                <i class="fas fa-stamp"></i>
            </div>
            <h1 class="text-[32px] font-bold text-gray-900 mb-2">Watermark PDF</h1>
            <p class="text-gray-600 text-[16px]">Protect your documents by adding custom text watermarks instantly.</p>
        </div>
    </div>

    <main class="flex-grow py-8 px-4">
        <div class="max-w-5xl mx-auto">
            
            <div id="dropZone" class="upload-area bg-white rounded-xl p-10 text-center cursor-pointer flex flex-col items-center justify-center min-h-[300px]" onclick="document.getElementById('fileInput').click()">
                <i class="fas fa-file-pdf text-5xl text-gray-300 mb-4"></i>
                <h3 class="text-xl font-bold text-gray-700 mb-2">Select PDF file</h3>
                <p class="text-gray-500 text-sm mb-6">Drag & drop your PDF here</p>
                <button class="bg-brandIndigo hover:bg-indigo-700 text-white font-bold py-3 px-8 rounded-lg transition-colors text-lg shadow-md">
                    Select PDF
                </button>
                <input type="file" id="fileInput" class="hidden" accept="application/pdf">
            </div>

            <div id="editorSection" class="hidden grid grid-cols-1 md:grid-cols-2 gap-8 mt-6">
                <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
                    <h4 class="font-bold text-gray-700 mb-4"><i class="fas fa-eye mr-2"></i> Live Preview</h4>
                    <canvas id="canvasPreview"></canvas>
                </div>

                <div class="bg-white p-8 rounded-xl border border-gray-200 shadow-sm flex flex-col gap-6">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Watermark Text</label>
                        <input type="text" id="wmText" value="CONFIDENTIAL" oninput="updatePreview()" class="w-full border-2 border-gray-200 rounded-lg p-3 focus:outline-none focus:border-brandIndigo text-lg font-semibold text-gray-700">
                    </div>
                    
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Position</label>
                        <select id="wmPos" onchange="updatePreview()" class="w-full border-2 border-gray-200 rounded-lg p-3 focus:outline-none focus:border-brandIndigo font-semibold text-gray-700 bg-white cursor-pointer">
                            <option value="center">Center</option>
                            <option value="top">Top</option>
                            <option value="bottom">Bottom</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Opacity</label>
                        <input type="range" id="wmOpacity" min="0.1" max="1" step="0.1" value="0.3" oninput="updatePreview()" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-brandIndigo">
                    </div>

                    <button onclick="applyWatermark()" class="w-full bg-brandIndigo hover:bg-indigo-700 text-white font-bold py-4 rounded-lg transition-colors text-lg shadow-lg flex items-center justify-center gap-2">
                        <i class="fas fa-stamp"></i> Apply & Download
                    </button>
                </div>
            </div>

            <div id="downloadSection" class="hidden mt-8 text-center bg-white p-10 rounded-xl border border-gray-200 shadow-sm">
                <i class="fas fa-check-circle text-5xl text-green-500 mb-4"></i>
                <h2 class="text-2xl font-bold text-gray-900 mb-6">Watermark applied successfully!</h2>
                <a id="downloadBtn" href="#" class="bg-brandIndigo hover:bg-indigo-700 text-white font-bold py-4 px-10 rounded-lg transition-colors text-xl shadow-lg inline-flex items-center gap-3">
                    <i class="fas fa-download"></i> Download Watermarked PDF
                </a>
            </div>
        </div>
    </main>

    <script>
        let pdfDoc = null;
        let pdfBytes = null;
        let pageData = null;

        document.getElementById('fileInput').onchange = async (e) => {
            const file = e.target.files[0];
            pdfBytes = await file.arrayBuffer();
            pdfDoc = await PDFLib.PDFDocument.load(pdfBytes);
            
            const pdfjsDoc = await pdfjsLib.getDocument({ data: pdfBytes }).promise;
            pageData = await pdfjsDoc.getPage(1);
            
            document.getElementById('dropZone').classList.add('hidden');
            document.getElementById('editorSection').classList.remove('hidden');
            updatePreview();
        };

        async function updatePreview() {
            const viewport = pageData.getViewport({ scale: 1.0 });
            const canvas = document.getElementById('canvasPreview');
            const ctx = canvas.getContext('2d');
            canvas.width = viewport.width;
            canvas.height = viewport.height;

            await pageData.render({ canvasContext: ctx, viewport: viewport }).promise;

            const text = document.getElementById('wmText').value;
            const opacity = document.getElementById('wmOpacity').value;
            const pos = document.getElementById('wmPos').value;

            ctx.globalAlpha = opacity;
            ctx.fillStyle = "gray";
            ctx.font = "bold 60px Inter";
            ctx.textAlign = "center";

            let x = canvas.width / 2;
            let y = canvas.height / 2;
            if(pos === 'top') y = 150;
            if(pos === 'bottom') y = canvas.height - 150;

            ctx.fillText(text, x, y);
        }

        async function applyWatermark() {
            const text = document.getElementById('wmText').value;
            const opacity = parseFloat(document.getElementById('wmOpacity').value);
            const pos = document.getElementById('wmPos').value;
            
            const pages = pdfDoc.getPages();
            pages.forEach(page => {
                const { width, height } = page.getSize();
                let y = height / 2;
                if(pos === 'top') y = height - 100;
                if(pos === 'bottom') y = 100;

                page.drawText(text, {
                    x: width / 2 - (text.length * 15), 
                    y: y,
                    size: 50,
                    opacity: opacity,
                    color: PDFLib.rgb(0.5, 0.5, 0.5)
                });
            });

            const newPdfBytes = await pdfDoc.save();
            const blob = new Blob([newPdfBytes], { type: "application/pdf" });
            const url = URL.createObjectURL(blob);
            
            document.getElementById('downloadBtn').href = url;
            document.getElementById('downloadBtn').download = "ToolMitra_Watermarked.pdf";
            
            document.getElementById('editorSection').classList.add('hidden');
            document.getElementById('downloadSection').classList.remove('hidden');
        }
    </script>
</body>
</html>
