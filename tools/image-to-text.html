<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image to Text (OCR) - ToolMitra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src='https://unpkg.com/tesseract.js@v4.1.0/dist/tesseract.min.js'></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { brandBlue: '#3b82f6' }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f8f9fa; color: #333333; }
        .upload-area { border: 2px dashed #d1d5db; transition: all 0.3s ease; }
        .upload-area.dragover { border-color: #3b82f6; background-color: #eff6ff; }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col">

    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-[1400px] mx-auto px-4 h-16 flex justify-between items-center">
            <a href="../index.html" class="flex items-center gap-2 hover:opacity-80 transition">
                <i class="fas fa-heart text-[#e5322d] text-2xl"></i>
                <span class="font-bold text-2xl tracking-tight text-gray-900">ToolMitra</span>
            </a>
            <a href="../index.html" class="text-sm font-semibold text-gray-600 hover:text-brandBlue flex items-center gap-2">
                <i class="fas fa-arrow-left"></i> Back to All Tools
            </a>
        </div>
    </nav>

    <div class="bg-blue-50 border-b border-blue-100 pt-10 pb-8">
        <div class="max-w-4xl mx-auto text-center px-4">
            <div class="w-16 h-16 mx-auto bg-white text-brandBlue rounded-2xl flex items-center justify-center text-3xl mb-4 shadow-sm border border-blue-100">
                <i class="fas fa-font"></i>
            </div>
            <h1 class="text-[32px] font-bold text-gray-900 mb-2">Image to Text (OCR)</h1>
            <p class="text-gray-600 text-[16px]">Extract text from images instantly using our AI-powered OCR tool.</p>
        </div>
    </div>

    <main class="flex-grow py-8 px-4">
        <div class="max-w-5xl mx-auto">
            
            <div id="dropZone" class="upload-area bg-white rounded-xl p-10 text-center cursor-pointer flex flex-col items-center justify-center min-h-[300px]" onclick="document.getElementById('fileInput').click()">
                <i class="fas fa-camera text-5xl text-gray-300 mb-4"></i>
                <h3 class="text-xl font-bold text-gray-700 mb-2">Upload Image</h3>
                <p class="text-gray-500 text-sm mb-6">Extract text from PNG, JPG, or JPEG images</p>
                <button class="bg-brandBlue hover:bg-blue-600 text-white font-bold py-3 px-8 rounded-lg transition-colors text-lg shadow-md">
                    Select Image
                </button>
                <input type="file" id="fileInput" class="hidden" accept="image/*">
            </div>

            <div id="processingSection" class="hidden mt-8 text-center bg-white p-10 rounded-xl border border-gray-200 shadow-sm max-w-2xl mx-auto">
                <div class="relative w-24 h-24 mx-auto mb-6">
                    <i class="fas fa-magic text-4xl text-brandBlue absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2"></i>
                    <svg class="animate-spin w-full h-full text-blue-200" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle><path class="opacity-75" fill="#3b82f6" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                </div>
                <h3 class="text-2xl font-bold text-gray-800 mb-2">Analyzing Image...</h3>
                <div class="w-full bg-gray-200 rounded-full h-2.5 mb-2"><div id="progressBar" class="bg-brandBlue h-2.5 rounded-full transition-all duration-300" style="width: 0%"></div></div>
                <p class="text-xs text-brandBlue font-bold" id="progressText">Starting OCR engine...</p>
            </div>

            <div id="resultSection" class="hidden mt-8">
                <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="font-bold text-gray-800 text-lg">Extracted Text</h3>
                        <div class="flex gap-2">
                            <button onclick="copyText()" class="bg-brandBlue text-white px-4 py-2 rounded font-bold text-sm hover:bg-blue-600"><i class="fas fa-copy mr-2"></i> Copy</button>
                            <button onclick="resetTool()" class="bg-gray-200 text-gray-700 px-4 py-2 rounded font-bold text-sm hover:bg-gray-300">Reset</button>
                        </div>
                    </div>
                    <textarea id="outputText" class="w-full h-80 p-4 border border-gray-300 rounded-lg text-gray-800 focus:outline-none" readonly></textarea>
                </div>
            </div>
        </div>
    </main>

    <script>
        const fileInput = document.getElementById('fileInput');
        
        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('dropZone').classList.add('hidden');
            document.getElementById('processingSection').classList.remove('hidden');

            const worker = await Tesseract.createWorker('eng');
            
            Tesseract.recognize(
                file,
                'eng',
                { logger: m => {
                    const progressBar = document.getElementById('progressBar');
                    const progressText = document.getElementById('progressText');
                    if (m.status === 'recognizing text') {
                        const percent = Math.round(m.progress * 100);
                        progressBar.style.width = percent + '%';
                        progressText.innerText = `Recognizing text... ${percent}%`;
                    }
                }}
            ).then(({ data: { text } }) => {
                document.getElementById('outputText').value = text;
                document.getElementById('processingSection').classList.add('hidden');
                document.getElementById('resultSection').classList.remove('hidden');
            });
        });

        function copyText() {
            const text = document.getElementById('outputText');
            text.select();
            document.execCommand('copy');
            alert("Text copied to clipboard!");
        }

        function resetTool() {
            document.getElementById('fileInput').value = "";
            document.getElementById('processingSection').classList.add('hidden');
            document.getElementById('resultSection').classList.add('hidden');
            document.getElementById('dropZone').classList.remove('hidden');
        }
    </script>
</body>
</html>
