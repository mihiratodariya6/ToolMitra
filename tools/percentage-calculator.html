    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<body class="bg-gray-50 font-sans p-4 md:p-8">
    
    <div class="max-w-md mx-auto bg-white p-8 rounded-xl border border-gray-200 shadow-sm">
        <h2 class="text-2xl font-bold text-gray-800 mb-8 text-center"><i class="fas fa-percent text-indigo-600 mr-2"></i> Percentage Calculator</h2>
        
        <div class="mb-8 p-4 bg-gray-50 rounded-lg">
            <h3 class="font-bold text-gray-700 mb-4">Calculate Percentage</h3>
            <div class="flex gap-2 mb-4">
                <input type="number" id="val1" class="w-1/2 p-3 border rounded-lg" placeholder="e.g. 20">
                <span class="flex items-center font-bold">% of</span>
                <input type="number" id="val2" class="w-1/2 p-3 border rounded-lg" placeholder="e.g. 500">
            </div>
            <button onclick="calc1()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg transition">Calculate</button>
            <p id="res1" class="mt-4 text-center font-bold text-indigo-600 text-lg"></p>
        </div>

        <div class="p-4 bg-gray-50 rounded-lg">
            <h3 class="font-bold text-gray-700 mb-4">Percentage of Value</h3>
            <div class="flex gap-2 mb-4">
                <input type="number" id="part" class="w-1/2 p-3 border rounded-lg" placeholder="e.g. 50">
                <span class="flex items-center font-bold">is what % of</span>
                <input type="number" id="total" class="w-1/2 p-3 border rounded-lg" placeholder="e.g. 500">
            </div>
            <button onclick="calc2()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg transition">Calculate</button>
            <p id="res2" class="mt-4 text-center font-bold text-indigo-600 text-lg"></p>
        </div>
    </div>

    <script>
        function calc1() {
            const v1 = parseFloat(document.getElementById('val1').value);
            const v2 = parseFloat(document.getElementById('val2').value);
            if(isNaN(v1) || isNaN(v2)) return alert("Enter numbers");
            const res = (v1 * v2) / 100;
            document.getElementById('res1').innerText = `${v1}% of ${v2} is ${res.toFixed(2)}`;
        }

        function calc2() {
            const p = parseFloat(document.getElementById('part').value);
            const t = parseFloat(document.getElementById('total').value);
            if(isNaN(p) || isNaN(t) || t === 0) return alert("Enter valid numbers");
            const res = (p / t) * 100;
            document.getElementById('res2').innerText = `${p} is ${res.toFixed(2)}% of ${t}`;
        }
    </script>
</body>
