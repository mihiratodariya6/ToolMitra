<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crop Image - ToolMitra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { brandTeal: '#14b8a6' } // Color for Cropping
                }
            }
        }
    </script>
    <style>
        body { background-color: #f8f9fa; color: #333333; }
        .upload-area { border: 2px dashed #d1d5db; transition: all 0.3s ease; }
        .upload-area.dragover { border-color: #14b8a6; background-color: #f0fdfa; }
        
        /* Cropper Container Height */
        .cropper-container-box { max-height: 500px; width: 100%; background: #000; border-radius: 8px; overflow: hidden; }
        #imageToCrop { max-width: 100%; display: block; }
        
        /* Active aspect ratio button */
        .ratio-btn.active { background-color: #14b8a6; color: white; border-color: #14b8a6; }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col">

    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-[1400px] mx-auto px-4 h-16 flex justify-between items-center">
            <a href="../index.html" class="flex items-center gap-2 hover:opacity-80 transition"><i class="fas fa-heart text-[#e5322d] text-2xl"></i> <span class="font-bold text-2xl">ToolMitra</span></a>
            <a href="../index.html" class="text-sm font-bold text-gray-600 hover:text-brandTeal"><i class="fas fa-arrow-left">Back to All Tools</i></a>
        </div>
    </nav>

    <div class="bg-teal-50 border-b border-teal-100 pt-10 pb-8 text-center">
        <div class="max-w-4xl mx-auto px-4">
            <div class="w-16 h-16 mx-auto bg-white text-brandTeal rounded-2xl flex items-center justify-center text-3xl mb-4 shadow-sm border border-teal-100">
                <i class="fas fa-crop-alt"></i>
            </div>
            <h1 class="text-[32px] font-bold text-gray-900 mb-2">Crop Image</h1>
            <p class="text-gray-600 text-[16px]">Visually trim your images, rotate them, or set specific aspect ratios.</p>
        </div>
    </div>

    <main class="flex-grow py-8 px-4">
        <div class="max-w-7xl mx-auto">
            
            <div id="dropZone" class="upload-area bg-white rounded-xl p-10 text-center cursor-pointer flex flex-col items-center justify-center min-h-[300px]" onclick="document.getElementById('fileInput').click()">
                <i class="fas fa-image text-5xl text-gray-300 mb-4"></i>
                <h3 class="text-xl font-bold text-gray-700 mb-2">Upload Image to Crop</h3>
                <p class="text-gray-500 text-sm mb-6">Drag & drop JPG, PNG, or WebP</p>
                <button class="bg-brandTeal hover:bg-teal-600 text-white font-bold py-3 px-8 rounded-lg shadow-md transition-colors text-lg">
                    Select Image
                </button>
                <input type="file" id="fileInput" class="hidden" accept="image/png, image/jpeg, image/webp">
            </div>

            <div id="workspaceSection" class="hidden mt-6 grid grid-cols-1 lg:grid-cols-12 gap-8">
                
                <div class="lg:col-span-8 bg-gray-950 p-4 rounded-xl shadow-inner flex flex-col items-center justify-center overflow-hidden min-h-[400px]">
                    <div class="cropper-container-box flex items-center justify-center">
                        <img id="imageToCrop" src="" alt="To Crop">
                    </div>
                </div>

                <div class="lg:col-span-4 bg-white p-6 rounded-xl border border-gray-200 shadow-sm flex flex-col">
                    <h3 class="font-bold text-gray-800 text-lg mb-4 border-b pb-2"><i class="fas fa-sliders-h mr-2 text-brandTeal"></i> Cropping Tools</h3>
                    
                    <div class="mb-6">
                        <label class="block text-sm font-bold text-gray-700 mb-2">Aspect Ratio</label>
                        <div class="grid grid-cols-3 gap-2">
                            <button onclick="setRatio(NaN, this)" class="ratio-btn active border-2 border-gray-200 text-gray-700 p-2 rounded-lg text-sm font-semibold hover:border-brandTeal hover:bg-teal-50 transition">Free</button>
                            <button onclick="setRatio(1, this)" class="ratio-btn border-2 border-gray-200 text-gray-700 p-2 rounded-lg text-sm font-semibold hover:border-brandTeal hover:bg-teal-50 transition">1:1 Square</button>
                            <button onclick="setRatio(16/9, this)" class="ratio-btn border-2 border-gray-200 text-gray-700 p-2 rounded-lg text-sm font-semibold hover:border-brandTeal hover:bg-teal-50 transition">16:9 HD</button>
                            <button onclick="setRatio(4/3, this)" class="ratio-btn border-2 border-gray-200 text-gray-700 p-2 rounded-lg text-sm font-semibold hover:border-brandTeal hover:bg-teal-50 transition">4:3 Standard</button>
                            <button onclick="setRatio(2/3, this)" class="ratio-btn border-2 border-gray-200 text-gray-700 p-2 rounded-lg text-sm font-semibold hover:border-brandTeal hover:bg-teal-50 transition">2:3 Portrait</button>
                        </div>
                    </div>

                    <div class="mb-6">
                        <label class="block text-sm font-bold text-gray-700 mb-2">Transform</label>
                        <div class="flex gap-2">
                            <button onclick="cropper.rotate(-90)" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 p-3 rounded-lg transition" title="Rotate Left"><i class="fas fa-undo"></i></button>
                            <button onclick="cropper.rotate(90)" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 p-3 rounded-lg transition" title="Rotate Right"><i class="fas fa-redo"></i></button>
                            <button onclick="flip('h')" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 p-3 rounded-lg transition" title="Flip Horizontal"><i class="fas fa-arrows-alt-h"></i></button>
                            <button onclick="flip('v')" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 p-3 rounded-lg transition" title="Flip Vertical"><i class="fas fa-arrows-alt-v"></i></button>
                        </div>
                    </div>

                    <hr class="my-6 border-gray-200">

                    <button id="cropBtn" onclick="getCroppedResult()" class="mt-auto w-full bg-brandTeal hover:bg-teal-700 text-white font-bold py-4 rounded-lg shadow-lg flex items-center justify-center gap-2 transition-colors text-lg">
                        <i class="fas fa-crop"></i> Crop & Download
                    </button>
                </div>

            </div>

            <div id="downloadSection" class="hidden mt-8 text-center bg-white p-10 rounded-xl border border-gray-200 shadow-sm">
                <i class="fas fa-check-circle text-6xl text-green-500 mb-6"></i>
                <h2 class="text-2xl font-bold text-gray-900 mb-6">Image Cropped Successfully!</h2>
                
                <a id="downloadBtn" href="#" class="bg-brandTeal hover:bg-teal-700 text-white font-bold py-4 px-10 rounded-lg shadow-lg inline-flex items-center gap-3 transition-colors text-xl">
                    <i class="fas fa-download"></i> Download Cropped Image
                </a>
                <div class="mt-6">
                    <button onclick="location.reload()" class="text-gray-500 hover:text-gray-700 font-semibold underline text-sm">Crop another image</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        let cropper = null;
        let currentFileType = 'image/jpeg';
        let currentFileName = 'image.jpg';
        let scaleH = 1, scaleV = 1;

        // Handle File Upload
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if(!file) return;

            currentFileType = file.type;
            currentFileName = file.name;

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = document.getElementById('imageToCrop');
                img.src = event.target.result;

                document.getElementById('dropZone').classList.add('hidden');
                document.getElementById('workspaceSection').classList.remove('hidden');

                // Initialize Cropper.js
                if (cropper) cropper.destroy(); // Destroy previous instance if any

                cropper = new Cropper(img, {
                    viewMode: 1, // Restrict crop box within image
                    dragMode: 'move', // Allow moving the image itself
                    autoCropArea: 0.8, // 80% of image area
                    responsive: true,
                    restore: false,
                    guides: true,
                    center: true,
                    highlight: true,
                    background: false, // Turn off checkerboard background in workspace
                    modal: true,
                    scalable: true,
                    zoomable: true
                });
            };
            reader.readAsDataURL(file);
        });

        // Set Aspect Ratio
        function setRatio(ratio, btn) {
            if(!cropper) return;
            cropper.setAspectRatio(ratio);
            
            // UI Feedback
            document.querySelectorAll('.ratio-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        // Flip Logic
        function flip(type) {
            if(!cropper) return;
            if(type === 'h') {
                scaleH = scaleH * -1;
                cropper.scaleX(scaleH);
            } else {
                scaleV = scaleV * -1;
                cropper.scaleY(scaleV);
            }
        }

        // Generate Final Cropped Image
        function getCroppedResult() {
            if(!cropper) return;

            // Get high-quality canvas from cropper
            const canvas = cropper.getCroppedCanvas({
                imageSmoothingEnabled: true,
                imageSmoothingQuality: 'high',
            });

            // Convert Canvas to Data URL
            const dataUrl = canvas.toDataURL(currentFileType, 0.95); // High quality

            // Setup Download
            const downloadBtn = document.getElementById('downloadBtn');
            downloadBtn.href = dataUrl;
            
            // Add "cropped_" prefix
            const nameParts = currentFileName.split('.');
            const ext = nameParts.pop();
            downloadBtn.download = nameParts.join('.') + "_cropped." + ext;

            // Update UI
            document.getElementById('workspaceSection').classList.add('hidden');
            document.getElementById('downloadSection').classList.remove('hidden');
        }
    </script>
</body>
</html>
