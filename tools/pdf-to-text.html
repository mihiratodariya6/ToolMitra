<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF to Text - ToolMitra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { brandBlue: '#3b82f6' }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f8f9fa; color: #333333; }
        .upload-area { border: 2px dashed #d1d5db; transition: all 0.3s ease; }
        .upload-area.dragover { border-color: #3b82f6; background-color: #eff6ff; }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col">

    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-[1400px] mx-auto px-4 h-16 flex justify-between items-center">
            <a href="../index.html" class="flex items-center gap-2"><i class="fas fa-heart text-[#e5322d] text-2xl"></i> <span class="font-bold text-2xl">ToolMitra</span></a>
            <a href="../index.html" class="text-sm font-bold text-gray-600 hover:text-brandBlue"><i class="fas fa-arrow-left"></i> Back</a>
        </div>
    </nav>

    <div class="bg-blue-50 border-b border-blue-100 pt-10 pb-8 text-center">
        <h1 class="text-[32px] font-bold text-gray-900 mb-2">PDF to Text</h1>
        <p class="text-gray-600">Extract text content from any PDF document.</p>
    </div>

    <main class="flex-grow py-8 px-4">
        <div class="max-w-3xl mx-auto">
            <div id="dropZone" class="upload-area bg-white rounded-xl p-10 text-center cursor-pointer flex flex-col items-center justify-center min-h-[300px]" onclick="document.getElementById('fileInput').click()">
                <i class="fas fa-file-pdf text-5xl text-gray-300 mb-4"></i>
                <h3 class="text-xl font-bold text-gray-700 mb-2">Upload PDF</h3>
                <input type="file" id="fileInput" class="hidden" accept="application/pdf">
            </div>

            <div id="resultSection" class="hidden mt-8">
                <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="font-bold text-gray-800 text-lg">Extracted Text</h3>
                        <button onclick="copyText()" class="bg-brandBlue text-white px-4 py-2 rounded font-bold text-sm hover:bg-blue-600"><i class="fas fa-copy mr-2"></i> Copy</button>
                    </div>
                    <textarea id="outputText" class="w-full h-80 p-4 border border-gray-300 rounded-lg text-gray-800 focus:outline-none" readonly></textarea>
                </div>
            </div>
        </div>
    </main>

    <script>
        document.getElementById('fileInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            let fullText = "";

            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();
                const pageText = textContent.items.map(item => item.str).join(" ");
                fullText += pageText + "\n\n";
            }

            document.getElementById('outputText').value = fullText;
            document.getElementById('dropZone').classList.add('hidden');
            document.getElementById('resultSection').classList.remove('hidden');
        });

        function copyText() {
            document.getElementById('outputText').select();
            document.execCommand('copy');
            alert("Copied!");
        }
    </script>
</body>
</html>
