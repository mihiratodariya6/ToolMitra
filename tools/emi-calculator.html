<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMI Calculator - ToolMitra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-8">
    <div class="max-w-md mx-auto bg-white p-8 rounded-xl border border-gray-200 shadow-sm">
        <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center"><i class="fas fa-calculator text-blue-600 mr-2"></i> EMI Calculator</h2>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Loan Amount (₹)</label>
                <input type="number" id="loanAmount" class="w-full p-3 border-2 border-gray-200 rounded-lg focus:border-blue-500 outline-none" placeholder="e.g. 500000">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Interest Rate (%)</label>
                <input type="number" id="interest" class="w-full p-3 border-2 border-gray-200 rounded-lg focus:border-blue-500 outline-none" placeholder="e.g. 8.5">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Tenure (Years)</label>
                <input type="number" id="tenure" class="w-full p-3 border-2 border-gray-200 rounded-lg focus:border-blue-500 outline-none" placeholder="e.g. 5">
            </div>
        </div>

        <button onclick="calculateEMI()" class="w-full mt-6 bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-lg transition">Calculate EMI</button>

        <div id="result" class="mt-6 p-4 bg-blue-50 rounded-lg text-center hidden">
            <p class="text-sm text-blue-600 font-bold">Monthly EMI</p>
            <p id="emiOutput" class="text-3xl font-bold text-blue-900">₹0</p>
        </div>
    </div>

    <script>
        function calculateEMI() {
            const p = parseFloat(document.getElementById('loanAmount').value);
            const annualRate = parseFloat(document.getElementById('interest').value);
            const years = parseFloat(document.getElementById('tenure').value);
            
            const r = annualRate / (12 * 100);
            const n = years * 12;
            const emi = (p * r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1);
            
            document.getElementById('emiOutput').innerText = '₹' + emi.toLocaleString('en-IN', {maximumFractionDigits: 2});
            document.getElementById('result').classList.remove('hidden');
        }
    </script>
</body>
</html>
