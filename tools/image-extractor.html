    <main class="flex-grow py-8 px-4">
        <div class="max-w-5xl mx-auto">
            
            <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm mb-8 flex flex-col md:flex-row gap-4 items-center">
                <div class="relative w-full">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">

                    </div>
                    <input type="url" id="urlInput" class="w-full pl-10 p-4 border-2 border-gray-200 rounded-lg focus:border-brandTeal outline-none text-lg" placeholder="https://example.com or direct .jpg link" required>
                </div>
                <button onclick="extractImages()" class="w-full md:w-auto bg-brandTeal hover:bg-teal-700 text-white font-bold py-4 px-8 rounded-lg transition shadow-md whitespace-nowrap flex items-center justify-center gap-2">
                    <i class="fas fa-search"></i> Extract
                </button>
            </div>

            <div id="statusSection" class="text-center mb-8 hidden">
                <div id="loadingSpinner" class="hidden text-brandTeal font-bold text-lg"><i class="fas fa-circle-notch fa-spin mr-2"></i> Processing link...</div>
                <div id="errorMessage" class="hidden text-red-500 font-bold bg-red-50 p-4 rounded-lg border border-red-100"></div>
                <div id="successMessage" class="hidden text-green-600 font-bold bg-green-50 p-4 rounded-lg border border-green-100"></div>
            </div>

            <div id="imageGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                </div>

        </div>
    </main>

    <script>
        async function extractImages() {
            const urlInput = document.getElementById('urlInput').value.trim();
            const statusSection = document.getElementById('statusSection');
            const loadingSpinner = document.getElementById('loadingSpinner');
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');
            const imageGrid = document.getElementById('imageGrid');

            errorMessage.classList.add('hidden');
            successMessage.classList.add('hidden');
            imageGrid.innerHTML = '';
            
            if (!urlInput) {
                showError("Please enter a valid URL.");
                return;
            }

            let targetUrl = urlInput;
            if (!/^https?:\/\//i.test(targetUrl)) {
                targetUrl = 'http://' + targetUrl;
            }

            statusSection.classList.remove('hidden');
            loadingSpinner.classList.remove('hidden');

            // --- SMART FEATURE: Check if it's a direct image link ---
            const isDirectImage = /\.(jpeg|jpg|gif|png|svg|webp)(\?.*)?$/i.test(targetUrl);

            if (isDirectImage) {
                loadingSpinner.classList.add('hidden');
                successMessage.innerText = "Direct image link detected!";
                successMessage.classList.remove('hidden');
                renderImageCard(targetUrl, 0);
                return;
            }

            // --- EXTRACT FROM WEBPAGE ---
            try {
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;
                const response = await fetch(proxyUrl);
                if (!response.ok) throw new Error("Network response was not ok");
                
                const data = await response.json();
                if (!data.contents) throw new Error("Could not fetch the website content.");

                const parser = new DOMParser();
                const doc = parser.parseFromString(data.contents, 'text/html');
                const imgElements = Array.from(doc.querySelectorAll('img'));
                const targetBaseUrl = new URL(targetUrl);
                let validImageUrls = [];

                imgElements.forEach(img => {
                    let src = img.getAttribute('src') || img.getAttribute('data-src');
                    if (src && !src.startsWith('data:image')) {
                        try {
                            const absoluteUrl = new URL(src, targetBaseUrl.origin).href;
                            validImageUrls.push(absoluteUrl);
                        } catch (e) {}
                    }
                });

                validImageUrls = [...new Set(validImageUrls)];
                loadingSpinner.classList.add('hidden');

                if (validImageUrls.length === 0) {
                    showError("No images found on this webpage.");
                    return;
                }

                successMessage.innerText = `Successfully extracted ${validImageUrls.length} images!`;
                successMessage.classList.remove('hidden');

                validImageUrls.forEach((imgUrl, index) => {
                    renderImageCard(imgUrl, index);
                });

            } catch (error) {
                loadingSpinner.classList.add('hidden');
                showError("Failed to extract images. The website might be highly secured, blocking access, or the URL is invalid.");
            }
        }

        function renderImageCard(imgUrl, index) {
            const imageGrid = document.getElementById('imageGrid');
            const card = document.createElement('div');
            card.className = "img-card bg-white p-3 rounded-xl border border-gray-200 shadow-sm flex flex-col";
            card.innerHTML = `
                <div class="h-40 w-full bg-gray-100 rounded-lg overflow-hidden flex items-center justify-center mb-3">
                    <img src="${imgUrl}" alt="Extracted Image ${index + 1}" class="max-h-full max-w-full object-contain" onerror="this.parentElement.innerHTML='<i class=\\'fas fa-image-slash text-gray-400 text-3xl\\'></i>'">
                </div>
                <div class="mt-auto flex gap-2">
                    <a href="${imgUrl}" target="_blank" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 text-center font-bold py-2 rounded text-sm transition"><i class="fas fa-external-link-alt"></i> Open</a>
                    <button onclick="downloadImage('${imgUrl}')" class="flex-1 bg-brandTeal hover:bg-teal-700 text-white text-center font-bold py-2 rounded text-sm transition"><i class="fas fa-download"></i> Save</button>
                </div>
            `;
            imageGrid.appendChild(card);
        }

        function showError(msg) {
            const errorMessage = document.getElementById('errorMessage');
            errorMessage.innerText = msg;
            errorMessage.classList.remove('hidden');
        }

        async function downloadImage(url) {
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                const blobUrl = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = "ToolMitra_Image.jpg";
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(blobUrl);
            } catch (e) {
                window.open(url, '_blank');
            }
        }
    </script>
