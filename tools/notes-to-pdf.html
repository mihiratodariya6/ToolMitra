<body class="antialiased min-h-screen flex flex-col">

    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-[1400px] mx-auto px-4 h-16 flex justify-between items-center">
            <a href="../index.html" class="flex items-center gap-2 hover:opacity-80 transition"><i class="fas fa-heart text-[#e5322d] text-2xl"></i> <span class="font-bold text-2xl">ToolMitra</span></a>
            <a href="../index.html" class="text-sm font-bold text-gray-600 hover:text-brandRed"><i class="fas fa-arrow-left mr-2"></i> Back to Tools</a>
        </div>
    </nav>

    <div class="bg-red-50 border-b border-red-100 pt-10 pb-8 text-center">
        <div class="w-16 h-16 mx-auto bg-white text-brandRed rounded-2xl flex items-center justify-center text-3xl mb-4 shadow-sm border border-red-100">
            <i class="fas fa-file-pdf"></i>
        </div>
        <h1 class="text-[32px] font-bold text-gray-900 mb-2">Notes to PDF</h1>
        <p class="text-gray-600">Type or paste your notes and instantly convert them into a formatted PDF document.</p>
    </div>

    <main class="flex-grow py-8 px-4">
        <div class="max-w-4xl mx-auto">
            
            <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm mb-6">
                <div class="mb-6">
                    <label class="block text-sm font-bold text-gray-700 mb-2">Document Title</label>
                    <input type="text" id="pdfTitle" class="w-full p-4 border-2 border-gray-200 rounded-lg focus:border-brandRed outline-none font-bold text-lg" placeholder="e.g., My Meeting Notes">
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Your Notes</label>
                    <textarea id="pdfContent" rows="12" class="notebook-bg w-full p-4 border-2 border-gray-200 rounded-lg focus:border-brandRed outline-none text-lg resize-y" placeholder="Start typing your notes here..."></textarea>
                </div>
            </div>

            <button onclick="generatePDF()" id="generateBtn" class="w-full bg-brandRed hover:bg-red-700 text-white font-bold py-4 rounded-lg shadow-lg flex items-center justify-center gap-2 transition text-xl">
                <i class="fas fa-file-export"></i> Download as PDF
            </button>

            <div id="successMessage" class="hidden mt-6 text-center bg-green-50 p-6 rounded-xl border border-green-200">
                <i class="fas fa-check-circle text-4xl text-green-500 mb-3"></i>
                <h3 class="text-xl font-bold text-green-800">PDF Generated Successfully!</h3>
                <p class="text-green-600 mt-1">Your notes have been downloaded.</p>
            </div>

        </div>
    </main>

    <script>
        function generatePDF() {
            const title = document.getElementById('pdfTitle').value.trim() || 'ToolMitra Notes';
            const content = document.getElementById('pdfContent').value.trim();
            const btn = document.getElementById('generateBtn');
            const successMsg = document.getElementById('successMessage');

            if (!content) {
                alert("Please enter some notes to convert to PDF.");
                return;
            }

            // Show loading state
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Generating PDF...';
            btn.classList.add('opacity-75', 'cursor-not-allowed');

            setTimeout(() => {
                try {
                    const { jsPDF } = window.jspdf;
                    const doc = new jsPDF();
                    
                    // Page margins and setup
                    const margin = 20;
                    const pageWidth = doc.internal.pageSize.width;
                    const pageHeight = doc.internal.pageSize.height;
                    let cursorY = margin;

                    // Add Title
                    doc.setFontSize(22);
                    doc.setFont("helvetica", "bold");
                    doc.setTextColor(33, 33, 33);
                    const titleLines = doc.splitTextToSize(title, pageWidth - margin * 2);
                    doc.text(titleLines, margin, cursorY);
                    cursorY += (titleLines.length * 10) + 5;

                    // Add a line below title
                    doc.setDrawColor(229, 231, 235); // Gray-200
                    doc.setLineWidth(0.5);
                    doc.line(margin, cursorY - 3, pageWidth - margin, cursorY - 3);
                    cursorY += 10;

                    // Add Content
                    doc.setFontSize(12);
                    doc.setFont("helvetica", "normal");
                    doc.setTextColor(75, 85, 99); // Gray-600
                    
                    const contentLines = doc.splitTextToSize(content, pageWidth - margin * 2);
                    
                    // Logic for multiple pages
                    for (let i = 0; i < contentLines.length; i++) {
                        if (cursorY > pageHeight - margin) {
                            doc.addPage();
                            cursorY = margin;
                        }
                        doc.text(contentLines[i], margin, cursorY);
                        cursorY += 7; // Line spacing
                    }

                    // Add Footer (Watermark)
                    const pageCount = doc.internal.getNumberOfPages();
                    for (let i = 1; i <= pageCount; i++) {
                        doc.setPage(i);
                        doc.setFontSize(9);
                        doc.setTextColor(156, 163, 175);
                        doc.text(`Generated by ToolMitra - Page ${i} of ${pageCount}`, pageWidth / 2, pageHeight - 10, { align: 'center' });
                    }

                    // Download the PDF
                    let fileName = title.replace(/[^a-z0-9]/gi, '_').toLowerCase() + '.pdf';
                    doc.save(fileName);

                    // Show success
                    successMsg.classList.remove('hidden');
                    
                } catch (error) {
                    console.error("PDF Generation Error:", error);
                    alert("Something went wrong while generating the PDF.");
                } finally {
                    // Reset button
                    btn.innerHTML = '<i class="fas fa-file-export"></i> Download as PDF';
                    btn.classList.remove('opacity-75', 'cursor-not-allowed');
                    
                    // Hide success message after 4 seconds
                    setTimeout(() => {
                        successMsg.classList.add('hidden');
                    }, 4000);
                }
            }, 500); // Small delay for UI update
        }
    </script>
</body>
</html>
