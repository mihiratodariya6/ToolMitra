<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word to PDF - ToolMitra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { brandBlue: '#3c78d8' }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f8f9fa; color: #333333; }
        .upload-area { border: 2px dashed #d1d5db; transition: all 0.3s ease; }
        .upload-area.dragover { border-color: #3c78d8; background-color: #f0f4fa; }
        
        /* Custom Radio Button Styling */
        input[type="radio"]:checked + span { color: #3c78d8; font-weight: bold; }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col">

    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-[1400px] mx-auto px-4 h-16 flex justify-between items-center">
            <a href="../index.html" class="flex items-center gap-2 hover:opacity-80 transition">
                <i class="fas fa-heart text-[#e5322d] text-2xl"></i>
                <span class="font-bold text-2xl tracking-tight text-gray-900">ToolMitra</span>
            </a>
            <a href="../index.html" class="text-sm font-semibold text-gray-600 hover:text-brandBlue flex items-center gap-2">
                <i class="fas fa-arrow-left"></i> Back to All Tools
            </a>
        </div>
    </nav>

    <div class="bg-white border-b border-gray-100 pt-10 pb-8">
        <div class="max-w-3xl mx-auto text-center px-4">
            <div class="w-16 h-16 mx-auto bg-blue-50 text-brandBlue rounded-2xl flex items-center justify-center text-3xl mb-4 shadow-sm">
                <i class="fas fa-file-word"></i>
            </div>
            <h1 class="text-[32px] font-bold text-gray-900 mb-2">Word to PDF</h1>
            <p class="text-gray-500 text-[16px]">Convert DOCX files to PDF. Now with Color and Black & White support!</p>
        </div>
    </div>

    <main class="flex-grow py-8 px-4">
        <div class="max-w-3xl mx-auto">
            
            <div id="dropZone" class="upload-area bg-white rounded-xl p-10 text-center cursor-pointer flex flex-col items-center justify-center min-h-[300px]" onclick="document.getElementById('fileInput').click()">
                <i class="fas fa-file-word text-5xl text-gray-300 mb-4"></i>
                <h3 class="text-xl font-bold text-gray-700 mb-2">Select WORD file</h3>
                <p class="text-gray-500 text-sm mb-6">or drop Word document here (.docx)</p>
                <button class="bg-brandBlue hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-lg transition-colors text-lg shadow-md">
                    Select WORD file
                </button>
                <input type="file" id="fileInput" class="hidden" accept=".docx">
            </div>

            <div id="workspaceSection" class="hidden mt-4">
                
                <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm mb-6 flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <i class="fas fa-file-word text-4xl text-brandBlue"></i>
                        <div>
                            <h3 id="fileName" class="font-bold text-gray-800 text-lg truncate max-w-xs md:max-w-md">document.docx</h3>
                            <p class="text-sm text-gray-500" id="fileSizeTxt">0 KB</p>
                        </div>
                    </div>
                    <button onclick="resetTool()" class="text-gray-400 hover:text-red-500 transition"><i class="fas fa-trash-alt text-xl"></i></button>
                </div>

                <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm mb-6">
                    <h3 class="font-bold text-gray-800 text-lg mb-4">Document Color Theme</h3>
                    
                    <div class="flex flex-col sm:flex-row gap-4">
                        <label class="flex-1 cursor-pointer">
                            <input type="radio" name="colorMode" value="color" class="peer sr-only" checked>
                            <div class="border-2 border-gray-200 rounded-lg p-4 peer-checked:border-brandBlue peer-checked:bg-blue-50 transition-all flex items-center gap-3">
                                <div class="w-10 h-10 rounded-full bg-blue-100 text-blue-500 flex items-center justify-center text-xl">
                                    <i class="fas fa-palette"></i>
                                </div>
                                <div>
                                    <h4 class="font-bold text-gray-800">Color PDF</h4>
                                    <p class="text-xs text-gray-500">Retain blue headings & colors.</p>
                                </div>
                            </div>
                        </label>

                        <label class="flex-1 cursor-pointer">
                            <input type="radio" name="colorMode" value="bw" class="peer sr-only">
                            <div class="border-2 border-gray-200 rounded-lg p-4 peer-checked:border-gray-800 peer-checked:bg-gray-100 transition-all flex items-center gap-3">
                                <div class="w-10 h-10 rounded-full bg-gray-200 text-gray-700 flex items-center justify-center text-xl">
                                    <i class="fas fa-adjust"></i>
                                </div>
                                <div>
                                    <h4 class="font-bold text-gray-800">Black & White</h4>
                                    <p class="text-xs text-gray-500">Force all text to dark black.</p>
                                </div>
                            </div>
                        </label>
                    </div>
                </div>

                <div class="text-center bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
                    <button id="convertBtn" onclick="processWordToPdf()" class="bg-brandBlue hover:bg-blue-700 text-white font-bold py-4 px-10 rounded-lg transition-colors text-xl shadow-lg inline-flex items-center gap-3 w-full sm:w-auto">
                        <i class="fas fa-cog"></i> Convert to PDF
                    </button>
                    <p id="statusText" class="text-gray-500 mt-3 hidden"><i class="fas fa-spinner fa-spin text-brandBlue"></i> Converting Word elements to PDF layout...</p>
                </div>
            </div>

            <div id="downloadSection" class="hidden mt-8 text-center bg-white p-10 rounded-xl border border-gray-200 shadow-sm">
                <i class="fas fa-check-circle text-5xl text-green-500 mb-4"></i>
                <h2 class="text-2xl font-bold text-gray-900 mb-6">WORD file has been converted to PDF!</h2>
                
                <button id="downloadBtn" class="bg-brandBlue hover:bg-blue-700 text-white font-bold py-4 px-10 rounded-lg transition-colors text-xl shadow-lg inline-flex items-center gap-3">
                    <i class="fas fa-download"></i> Download PDF File
                </button>
                
                <div class="mt-6">
                    <button onclick="resetTool()" class="text-gray-500 hover:text-gray-700 font-semibold underline text-sm">Convert another Word file</button>
                </div>
            </div>

        </div>
    </main>

    <script>
        let currentFile = null;
        let pdfBlobUrl = null;
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');

        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            handleFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));

        function handleFile(file) {
            if (!file) return;
            
            if (file.name.endsWith('.docx') || file.type === "application/vnd.openxmlformats-officedocument.wordprocessingml.document") {
                currentFile = file;
                document.getElementById('fileName').innerText = file.name;
                document.getElementById('fileSizeTxt').innerText = (file.size / 1024).toFixed(2) + " KB";
                
                dropZone.classList.add('hidden');
                document.getElementById('workspaceSection').classList.remove('hidden');
            } else {
                alert("Please upload a valid Word document (.docx format).");
            }
        }

        function processWordToPdf() {
            const convertBtn = document.getElementById('convertBtn');
            const statusText = document.getElementById('statusText');
            
            // Check selected color mode
            const colorMode = document.querySelector('input[name="colorMode"]:checked').value;

            convertBtn.classList.add('hidden');
            statusText.classList.remove('hidden');

            const reader = new FileReader();
            reader.onload = function(loadEvent) {
                const arrayBuffer = loadEvent.target.result;
                
                mammoth.convertToHtml({ arrayBuffer: arrayBuffer })
                .then(function(result) {
                    const htmlContent = result.value; 
                    
                    const element = document.createElement('div');
                    element.style.padding = '45px';
                    element.style.fontFamily = 'Inter, sans-serif';
                    element.style.lineHeight = '1.6';
                    
                    // Add Custom Theme based on user selection
                    let customStyle = '';
                    if (colorMode === 'bw') {
                        // Force everything to black
                        customStyle = '<style> * { color: #000000 !important; } </style>';
                    } else {
                        // Add Word's default blue theme for headings to retain the look
                        customStyle = '<style> h1, h2, h3, h4, h5 { color: #2f5496 !important; margin-top: 20px; } p { color: #333333; } a { color: #0563c1 !important; text-decoration: none; } </style>';
                    }
                    
                    element.innerHTML = customStyle + htmlContent;
                    
                    const opt = {
                        margin:       [0.5, 0.5, 0.5, 0.5],
                        filename:     currentFile.name.replace(/\.[^/.]+$/, "") + ".pdf",
                        image:        { type: 'jpeg', quality: 0.98 },
                        html2canvas:  { scale: 2, useCORS: true },
                        jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' }
                    };
                    
                    html2pdf().set(opt).from(element).outputPdf('blob').then(function(blob) {
                        pdfBlobUrl = URL.createObjectURL(blob);
                        
                        const downloadBtn = document.getElementById('downloadBtn');
                        downloadBtn.onclick = function() {
                            const a = document.createElement('a');
                            a.href = pdfBlobUrl;
                            a.download = opt.filename;
                            document.body.appendChild(a);
                            a.click();
                            document.body.removeChild(a);
                        };

                        document.getElementById('workspaceSection').classList.add('hidden');
                        document.getElementById('downloadSection').classList.remove('hidden');
                    }).catch(err => {
                        console.error(err);
                        alert("Error generating PDF structure.");
                        resetBtnUI();
                    });
                })
                .catch(function(err) {
                    console.error(err);
                    alert("Error parsing Word document elements.");
                    resetBtnUI();
                });
            };
            
            reader.readAsArrayBuffer(currentFile);
        }

        function resetBtnUI() {
            document.getElementById('convertBtn').classList.remove('hidden');
            document.getElementById('statusText').classList.add('hidden');
        }

        function resetTool() {
            currentFile = null;
            if (pdfBlobUrl) URL.revokeObjectURL(pdfBlobUrl);
            pdfBlobUrl = null;
            fileInput.value = "";
            
            // Reset to Color mode by default
            document.querySelector('input[name="colorMode"][value="color"]').checked = true;
            
            document.getElementById('workspaceSection').classList.add('hidden');
            document.getElementById('downloadSection').classList.add('hidden');
            document.getElementById('statusText').classList.add('hidden');
            document.getElementById('convertBtn').classList.remove('hidden');
            dropZone.classList.remove('hidden');
        }
    </script>
</body>
</html>
