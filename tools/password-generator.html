    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { brandViolet: '#8b5cf6' }
                }
            }
        }

    <style>
        body { background-color: #f8f9fa; color: #333333; }
        /* Custom Checkbox */
        .custom-checkbox { width: 1.5rem; height: 1.5rem; accent-color: #8b5cf6; cursor: pointer; }
        /* Custom Range Slider */
        input[type=range] { accent-color: #8b5cf6; }

<body class="antialiased min-h-screen flex flex-col">

    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-[1400px] mx-auto px-4 h-16 flex justify-between items-center">
            <a href="../index.html" class="flex items-center gap-2 hover:opacity-80 transition">
                <i class="fas fa-heart text-[#e5322d] text-2xl"></i>
                <span class="font-bold text-2xl tracking-tight text-gray-900">ToolMitra</span>
            </a>
            <a href="../index.html" class="text-sm font-semibold text-gray-600 hover:text-brandViolet flex items-center gap-2">
                <i class="fas fa-arrow-left"></i> Back to All Tools
            </a>
        </div>
    </nav>

    <div class="bg-violet-50 border-b border-violet-100 pt-10 pb-8 text-center">
        <div class="max-w-4xl mx-auto px-4">
            <div class="w-16 h-16 mx-auto bg-white text-brandViolet rounded-2xl flex items-center justify-center text-3xl mb-4 shadow-sm border border-violet-100">
                <i class="fas fa-key"></i>
            </div>
            <h1 class="text-[32px] font-bold text-gray-900 mb-2">Strong Password Generator</h1>
            <p class="text-gray-600 text-[16px]">Create secure, random passwords to keep your accounts safe.</p>
        </div>
    </div>

    <main class="flex-grow py-8 px-4">
        <div class="max-w-xl mx-auto bg-white p-8 rounded-xl border border-gray-200 shadow-sm">
            
            <div class="relative mb-8">
                <input type="text" id="passwordOutput" class="w-full bg-gray-50 border-2 border-gray-200 rounded-xl p-5 text-2xl font-mono text-center text-gray-800 tracking-wider focus:outline-none" readonly placeholder="Click Generate">
                <button onclick="copyPassword()" class="absolute right-4 top-1/2 transform -translate-y-1/2 bg-brandViolet text-white w-10 h-10 rounded-lg hover:bg-violet-700 transition shadow-sm flex items-center justify-center" title="Copy Password">
                    <i class="fas fa-copy"></i>
                </button>
            </div>

            <div class="space-y-6 bg-violet-50/50 p-6 rounded-xl border border-violet-100">
                
                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="font-bold text-gray-700">Password Length</label>
                        <span id="lengthValue" class="bg-brandViolet text-white text-xs font-bold px-3 py-1 rounded-full">16</span>
                    </div>
                    <input type="range" id="passLength" min="8" max="32" value="16" oninput="updateLength(this.value)" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer">
                </div>

                <hr class="border-gray-200">

                <div class="grid grid-cols-2 gap-4">
                    <label class="flex items-center gap-3 cursor-pointer group">
                        <input type="checkbox" id="incUppercase" checked class="custom-checkbox">
                        <span class="text-gray-700 font-semibold group-hover:text-brandViolet transition">Uppercase (A-Z)</span>
                    </label>
                    <label class="flex items-center gap-3 cursor-pointer group">
                        <input type="checkbox" id="incLowercase" checked class="custom-checkbox">
                        <span class="text-gray-700 font-semibold group-hover:text-brandViolet transition">Lowercase (a-z)</span>
                    </label>
                    <label class="flex items-center gap-3 cursor-pointer group">
                        <input type="checkbox" id="incNumbers" checked class="custom-checkbox">
                        <span class="text-gray-700 font-semibold group-hover:text-brandViolet transition">Numbers (0-9)</span>
                    </label>
                    <label class="flex items-center gap-3 cursor-pointer group">
                        <input type="checkbox" id="incSymbols" checked class="custom-checkbox">
                        <span class="text-gray-700 font-semibold group-hover:text-brandViolet transition">Symbols (!@#$)</span>
                    </label>
                </div>
            </div>

            <button onclick="generatePassword()" class="mt-8 w-full bg-brandViolet hover:bg-violet-700 text-white font-bold py-4 rounded-xl transition-colors text-xl shadow-lg flex items-center justify-center gap-3">
                <i class="fas fa-sync-alt"></i> Generate Password
            </button>
            
        </div>
    </main>

    <script>
        const lowercaseChars = "abcdefghijklmnopqrstuvwxyz";
        const uppercaseChars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const numberChars = "0123456789";
        const symbolChars = "!@#$%^&*()_+~|}{[]:;?><,./-=";

        function updateLength(val) {
            document.getElementById('lengthValue').innerText = val;
        }

        function generatePassword() {
            const length = document.getElementById('passLength').value;
            const hasUpper = document.getElementById('incUppercase').checked;
            const hasLower = document.getElementById('incLowercase').checked;
            const hasNumbers = document.getElementById('incNumbers').checked;
            const hasSymbols = document.getElementById('incSymbols').checked;

            let allowedChars = "";
            if (hasUpper) allowedChars += uppercaseChars;
            if (hasLower) allowedChars += lowercaseChars;
            if (hasNumbers) allowedChars += numberChars;
            if (hasSymbols) allowedChars += symbolChars;

            if (allowedChars === "") {
                alert("Please select at least one character type!");
                return;
            }

            let password = "";
            for (let i = 0; i < length; i++) {
                const randomIndex = Math.floor(Math.random() * allowedChars.length);
                password += allowedChars[randomIndex];
            }

            document.getElementById('passwordOutput').value = password;
        }

        function copyPassword() {
            const passField = document.getElementById('passwordOutput');
            if (!passField.value) return;

            passField.select();
            passField.setSelectionRange(0, 99999); // For mobile devices
            document.execCommand("copy");
            
            // Visual feedback
            const btn = document.querySelector('button[title="Copy Password"]');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-check text-green-300"></i>';
            setTimeout(() => { btn.innerHTML = originalHTML; }, 2000);
        }

        // Generate one on page load
        window.onload = generatePassword;
    </script>
</body>
</html>
