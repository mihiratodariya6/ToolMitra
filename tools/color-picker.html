<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Picker - ToolMitra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] }, colors: { brandPink: '#ec4899' } } } }
    </script>
    <style>
        body { background-color: #f8f9fa; }
        #colorPreview { transition: background-color 0.3s ease; }
        /* Style the hidden color input */
        input[type="color"] { -webkit-appearance: none; border: none; width: 100%; height: 60px; cursor: pointer; background: none; }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 8px; }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col">

    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-[1400px] mx-auto px-4 h-16 flex justify-between items-center">
            <a href="../index.html" class="flex items-center gap-2 hover:opacity-80 transition"><i class="fas fa-heart text-[#e5322d] text-2xl"></i> <span class="font-bold text-2xl">ToolMitra</span></a>
            <a href="../index.html" class="text-sm font-bold text-gray-600 hover:text-brandPink"><i class="fas fa-arrow-left"></i> Back</a>
        </div>
    </nav>

    <main class="flex-grow py-12 px-4">
        <div class="max-w-md mx-auto bg-white p-8 rounded-xl border border-gray-200 shadow-sm">
            <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Color Picker</h2>
            
            <div id="colorPreview" class="w-full h-40 rounded-lg mb-6 border border-gray-200 shadow-inner bg-gray-100 flex items-center justify-center">
                <span id="previewText" class="font-bold text-gray-500">Pick a color</span>
            </div>
            
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-gray-50 p-3 rounded-lg border">
                    <p class="text-[10px] uppercase font-bold text-gray-400">HEX</p>
                    <p id="hexCode" class="font-mono font-bold text-gray-800">#FFFFFF</p>
                </div>
                <div class="bg-gray-50 p-3 rounded-lg border">
                    <p class="text-[10px] uppercase font-bold text-gray-400">RGB</p>
                    <p id="rgbCode" class="font-mono font-bold text-gray-800">rgb(255, 255, 255)</p>
                </div>
            </div>

            <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Interactive Palette</label>
            <input type="color" id="colorInput" class="mb-6 border-2 border-gray-200 rounded-lg">

            <button id="pickBtn" class="w-full bg-brandPink hover:bg-pink-600 text-white font-bold py-4 rounded-lg shadow-lg flex items-center justify-center gap-2 transition">
                <i class="fas fa-eye-dropper"></i> Screen EyeDropper
            </button>
            <p id="supportText" class="text-xs text-gray-400 mt-4 text-center"></p>
        </div>
    </main>

    <script>
        const pickBtn = document.getElementById('pickBtn');
        const hexCode = document.getElementById('hexCode');
        const rgbCode = document.getElementById('rgbCode');
        const colorPreview = document.getElementById('colorPreview');
        const colorInput = document.getElementById('colorInput');
        const previewText = document.getElementById('previewText');

        // Logic for Interactive Palette
        colorInput.addEventListener('input', (e) => {
            updateUI(e.target.value);
        });

        // Logic for EyeDropper
        if (!window.EyeDropper) {
            pickBtn.disabled = true;
            document.getElementById('supportText').innerText = "EyeDropper not supported in this browser.";
        } else {
            pickBtn.addEventListener('click', async () => {
                try {
                    const eyeDropper = new EyeDropper();
                    const result = await eyeDropper.open();
                    updateUI(result.sRGBHex);
                } catch (e) {
                    console.log("User cancelled");
                }
            });
        }

        function updateUI(hex) {
            colorPreview.style.backgroundColor = hex;
            previewText.innerText = "";
            hexCode.innerText = hex.toUpperCase();
            
            // Convert Hex to RGB
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            rgbCode.innerText = `rgb(${r}, ${g}, ${b})`;
            colorInput.value = hex;
        }
    </script>
</body>
</html>
