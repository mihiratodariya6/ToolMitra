<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free AI Grammar Checker & Fixer - ToolMitra</title>
    <meta name="description" content="Instantly fix grammar, spelling, and punctuation errors in your text using advanced AI. Supports English, Spanish, French, German, and more. 100% Free.">
    <meta name="keywords" content="grammar checker, AI grammar fix, correct spelling, online grammar tool, proofreader, English grammar check">
    <meta name="author" content="ToolMitra">
    
    <meta property="og:title" content="AI Grammar Checker & Corrector - ToolMitra">
    <meta property="og:description" content="Improve your writing instantly. Fix grammar and spelling mistakes for free with our AI-powered tool.">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { brandGreen: '#10b981' }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f8f9fa; color: #333333; }
        .textarea-container textarea { resize: none; }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col">

    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-[1400px] mx-auto px-4 h-16 flex justify-between items-center">
            <a href="../index.html" class="flex items-center gap-2 hover:opacity-80 transition"><i class="fas fa-heart text-[#e5322d] text-2xl"></i> <span class="font-bold text-2xl">ToolMitra</span></a>
            <a href="../index.html" class="text-sm font-bold text-gray-600 hover:text-brandGreen"><i class="fas fa-arrow-left mr-2"></i> Back to Tools</a>
        </div>
    </nav>

    <header class="bg-green-50 border-b border-green-100 pt-12 pb-10 text-center">
        <div class="max-w-4xl mx-auto px-4">
            <div class="w-20 h-20 mx-auto bg-white text-brandGreen rounded-2xl flex items-center justify-center text-4xl mb-6 shadow-md border border-green-100">
                <i class="fas fa-spell-check"></i>
            </div>
            <h1 class="text-[36px] md:text-[42px] font-bold text-gray-900 mb-4 tracking-tight">AI Grammar & Spell Checker</h1>
            <p class="text-gray-600 text-lg max-w-2xl mx-auto">Instantly correct your grammar, spelling, and punctuation errors. Write flawlessly using our AI-powered proofreader.</p>
        </div>
    </header>

    <main class="flex-grow py-10 px-4">
        <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            <section class="bg-white p-6 rounded-2xl border border-gray-200 shadow-sm flex flex-col">
                <div class="flex justify-between items-center mb-4 border-b pb-2">
                    <h2 class="text-xl font-bold text-gray-800"><i class="fas fa-keyboard text-brandGreen mr-2"></i> Original Text</h2>
                    <select id="language" class="bg-gray-50 border border-gray-200 text-gray-700 text-sm rounded-lg focus:ring-brandGreen focus:border-brandGreen block p-2 font-bold outline-none">
                        <option value="en-US">English (US)</option>
                        <option value="en-GB">English (UK)</option>
                        <option value="es">Spanish</option>
                        <option value="fr">French</option>
                    </select>
                </div>
                
                <div class="mb-4">
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Custom Dictionary (Ignore these words)</label>
                    <input type="text" id="ignoreWords" class="w-full p-2 border border-gray-200 rounded-lg focus:border-brandGreen outline-none text-sm bg-gray-50" placeholder="e.g. Mihir, ToolMitra (comma separated)">
                </div>
                
                <textarea id="inputText" class="w-full flex-grow p-4 border-2 border-gray-200 rounded-lg focus:border-brandGreen outline-none text-gray-800 text-lg min-h-[250px]" placeholder="Type or paste your text here to check for grammar and spelling mistakes..."></textarea>
                
                <div class="flex justify-between items-center mt-4">
                    <span class="text-sm font-bold text-gray-400" id="charCount">0 Characters</span>
                    <button onclick="clearText()" class="text-red-500 font-bold hover:text-red-700 text-sm"><i class="fas fa-trash"></i> Clear</button>
                </div>

                <button id="fixBtn" onclick="fixGrammar()" class="w-full mt-6 bg-brandGreen hover:bg-green-700 text-white font-bold py-4 rounded-lg shadow-lg flex items-center justify-center gap-2 transition text-lg">
                    <i class="fas fa-magic"></i> Auto-Fix Grammar
                </button>
            </section>

            <section class="bg-white p-6 rounded-2xl border border-gray-200 shadow-sm flex flex-col relative">
                <div class="flex justify-between items-center mb-4 border-b pb-2">
                    <h2 class="text-xl font-bold text-gray-800"><i class="fas fa-check-double text-brandGreen mr-2"></i> Corrected Text</h2>
                    <span id="errorBadge" class="bg-gray-100 text-gray-600 text-xs font-bold px-3 py-1 rounded-full border border-gray-200">Waiting for text...</span>
                </div>
                
                <textarea id="outputText" class="w-full flex-grow p-4 border-2 border-gray-200 rounded-lg bg-gray-50 focus:border-brandGreen outline-none text-gray-800 text-lg min-h-[250px]" placeholder="Your corrected, error-free text will appear here..." readonly></textarea>
                
                <button id="copyBtn" onclick="copyResult()" class="w-full mt-6 bg-gray-800 hover:bg-gray-900 text-white font-bold py-4 rounded-lg shadow transition flex items-center justify-center gap-2 opacity-50 cursor-not-allowed" disabled>
                    <i class="fas fa-copy"></i> Copy Corrected Text
                </button>
            </section>

        </div>
    </main>

    <script>
        const inputText = document.getElementById('inputText');
        const outputText = document.getElementById('outputText');
        const fixBtn = document.getElementById('fixBtn');
        const copyBtn = document.getElementById('copyBtn');
        const errorBadge = document.getElementById('errorBadge');
        const charCount = document.getElementById('charCount');
        const ignoreWordsInput = document.getElementById('ignoreWords');

        inputText.addEventListener('input', () => {
            charCount.innerText = `${inputText.value.length} Characters`;
        });

        function clearText() {
            inputText.value = "";
            outputText.value = "";
            charCount.innerText = "0 Characters";
            errorBadge.innerText = "Waiting for text...";
            errorBadge.className = "bg-gray-100 text-gray-600 text-xs font-bold px-3 py-1 rounded-full border border-gray-200";
            copyBtn.disabled = true;
            copyBtn.classList.add('opacity-50', 'cursor-not-allowed');
        }

        async function fixGrammar() {
            const text = inputText.value.trim();
            const lang = document.getElementById('language').value;
            
            // Get user's custom ignore list
            const ignoreList = ignoreWordsInput.value.toLowerCase().split(',').map(w => w.trim()).filter(w => w !== "");
            
            if (!text) {
                alert("Please enter some text to check.");
                return;
            }

            fixBtn.disabled = true;
            fixBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Analyzing...';
            fixBtn.classList.add('opacity-75');
            errorBadge.innerText = "Scanning text...";
            errorBadge.className = "bg-yellow-100 text-yellow-700 text-xs font-bold px-3 py-1 rounded-full border border-yellow-200";

            try {
                const params = new URLSearchParams();
                params.append('text', text);
                params.append('language', lang);

                const response = await fetch('https://api.languagetoolplus.com/v2/check', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'Accept': 'application/json' },
                    body: params
                });

                if (!response.ok) throw new Error("API request failed");

                const data = await response.json();
                const matches = data.matches.sort((a, b) => b.offset - a.offset);
                
                let fixedText = text;
                let fixCount = 0;

                matches.forEach(match => {
                    const originalWord = text.substring(match.offset, match.offset + match.length).toLowerCase();
                    
                    // SMART FEATURE: Check if word is in Ignore List
                    if (ignoreList.includes(originalWord)) {
                        return; // Skip this correction
                    }

                    if (match.replacements && match.replacements.length > 0) {
                        const replacement = match.replacements[0].value;
                        const start = match.offset;
                        const end = match.offset + match.length;
                        
                        fixedText = fixedText.substring(0, start) + replacement + fixedText.substring(end);
                        fixCount++;
                    }
                });

                outputText.value = fixedText;
                
                if (fixCount === 0) {
                    errorBadge.innerHTML = '<i class="fas fa-check-circle"></i> No errors found!';
                    errorBadge.className = "bg-green-100 text-green-700 text-xs font-bold px-3 py-1 rounded-full border border-green-200";
                } else {
                    errorBadge.innerHTML = `<i class="fas fa-wrench"></i> Fixed ${fixCount} error(s)`;
                    errorBadge.className = "bg-brandGreen text-white text-xs font-bold px-3 py-1 rounded-full shadow-sm";
                }

                copyBtn.disabled = false;
                copyBtn.classList.remove('opacity-50', 'cursor-not-allowed');

            } catch (error) {
                console.error(error);
                alert("Failed to connect to grammar API. Please try again later.");
                errorBadge.innerText = "Error scanning text";
                errorBadge.className = "bg-red-100 text-red-700 text-xs font-bold px-3 py-1 rounded-full border border-red-200";
            } finally {
                fixBtn.disabled = false;
                fixBtn.innerHTML = '<i class="fas fa-magic"></i> Auto-Fix Grammar';
                fixBtn.classList.remove('opacity-75');
            }
        }

        function copyResult() {
            outputText.select();
            document.execCommand("copy");
            const originalHTML = copyBtn.innerHTML;
            copyBtn.innerHTML = '<i class="fas fa-check"></i> Copied!';
            copyBtn.classList.add('bg-green-600');
            setTimeout(() => {
                copyBtn.innerHTML = originalHTML;
                copyBtn.classList.remove('bg-green-600');
            }, 2000);
        }
    </script>
</body>
</html>
