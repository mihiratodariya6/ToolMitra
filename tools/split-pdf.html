<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Split PDF - ToolMitra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { brandOrange: '#f0714b' }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f8f9fa; color: #333333; }
        .upload-area { border: 2px dashed #d1d5db; transition: all 0.3s ease; }
        .upload-area.dragover { border-color: #f0714b; background-color: #fff6f4; }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col">

    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-[1400px] mx-auto px-4 h-16 flex justify-between items-center">
            <a href="../index.html" class="flex items-center gap-2 hover:opacity-80 transition">
                <i class="fas fa-heart text-[#e5322d] text-2xl"></i>
                <span class="font-bold text-2xl tracking-tight text-gray-900">ToolMitra</span>
            </a>
            <a href="../index.html" class="text-sm font-semibold text-gray-600 hover:text-brandOrange flex items-center gap-2">
                <i class="fas fa-arrow-left"></i> Back to All Tools
            </a>
        </div>
    </nav>

    <div class="bg-white border-b border-gray-100 pt-12 pb-10">
        <div class="max-w-3xl mx-auto text-center px-4">
            <div class="w-16 h-16 mx-auto bg-orange-50 text-brandOrange rounded-2xl flex items-center justify-center text-3xl mb-4 shadow-sm">
                <i class="fas fa-cut"></i>
            </div>
            <h1 class="text-[32px] font-bold text-gray-900 mb-3">Split PDF file</h1>
            <p class="text-gray-500 text-[18px]">Separate specific pages from your PDF file easily.</p>
        </div>
    </div>

    <main class="flex-grow py-10 px-4">
        <div class="max-w-3xl mx-auto">
            
            <div id="dropZone" class="upload-area bg-white rounded-xl p-10 text-center cursor-pointer flex flex-col items-center justify-center min-h-[300px]" onclick="document.getElementById('fileInput').click()">
                <i class="fas fa-file-upload text-5xl text-gray-300 mb-4"></i>
                <h3 class="text-xl font-bold text-gray-700 mb-2">Select a PDF file</h3>
                <p class="text-gray-500 text-sm mb-6">or drop PDF here</p>
                <button class="bg-brandOrange hover:bg-orange-600 text-white font-bold py-3 px-8 rounded-lg transition-colors text-lg shadow-md">
                    Select PDF file
                </button>
                <input type="file" id="fileInput" class="hidden" accept="application/pdf">
            </div>

            <div id="workspaceSection" class="hidden mt-8">
                
                <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm mb-6 flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <i class="fas fa-file-pdf text-4xl text-brandOrange"></i>
                        <div>
                            <h3 id="fileName" class="font-bold text-gray-800 text-lg truncate max-w-xs md:max-w-md">filename.pdf</h3>
                            <p class="text-sm text-gray-500">Total Pages: <span id="totalPages" class="font-bold">0</span></p>
                        </div>
                    </div>
                    <button onclick="resetTool()" class="text-gray-400 hover:text-red-500 transition"><i class="fas fa-trash-alt text-xl"></i></button>
                </div>

                <div class="bg-white p-8 rounded-xl border border-gray-200 shadow-sm mb-6">
                    <h3 class="font-bold text-gray-800 text-lg mb-4">Extract Pages</h3>
                    <p class="text-sm text-gray-500 mb-6">Enter the page range you want to extract into a new PDF.</p>
                    
                    <div class="flex items-center gap-4">
                        <div class="flex-1">
                            <label class="block text-xs font-bold text-gray-500 uppercase mb-1">From Page</label>
                            <input type="number" id="startPage" min="1" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:border-brandOrange text-lg">
                        </div>
                        <div class="text-gray-400 mt-5"><i class="fas fa-arrow-right"></i></div>
                        <div class="flex-1">
                            <label class="block text-xs font-bold text-gray-500 uppercase mb-1">To Page</label>
                            <input type="number" id="endPage" min="1" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:border-brandOrange text-lg">
                        </div>
                    </div>
                </div>

                <div class="text-center">
                    <button id="splitBtn" onclick="splitPdf()" class="bg-brandOrange hover:bg-orange-600 text-white font-bold py-4 px-10 rounded-lg transition-colors text-xl shadow-lg inline-flex items-center gap-3">
                        <i class="fas fa-cut"></i> Split PDF
                    </button>
                    <p id="statusText" class="text-gray-500 mt-3 hidden"><i class="fas fa-spinner fa-spin text-brandOrange"></i> Extracting pages...</p>
                </div>
            </div>

            <div id="downloadSection" class="hidden mt-8 text-center bg-white p-10 rounded-xl border border-gray-200 shadow-sm">
                <i class="fas fa-check-circle text-5xl text-green-500 mb-4"></i>
                <h2 class="text-2xl font-bold text-gray-900 mb-6">PDF has been split!</h2>
                <a id="downloadLink" href="#" download="ToolMitra_Split.pdf" class="bg-brandOrange hover:bg-orange-600 text-white font-bold py-4 px-10 rounded-lg transition-colors text-xl shadow-lg inline-flex items-center gap-3">
                    <i class="fas fa-download"></i> Download Split PDF
                </a>
                <div class="mt-6">
                    <button onclick="resetTool()" class="text-gray-500 hover:text-gray-700 font-semibold underline text-sm">Split another PDF</button>
                </div>
            </div>

        </div>
    </main>

    <script>
        let currentPdfBytes = null;
        let totalPdfPages = 0;
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');

        // Drag & drop logic
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            handleFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));

        async function handleFile(file) {
            if (!file || file.type !== "application/pdf") {
                alert("Please upload a valid PDF file.");
                return;
            }

            document.getElementById('fileName').innerText = file.name;
            currentPdfBytes = await file.arrayBuffer();
            
            // Load PDF just to get page count
            const { PDFDocument } = PDFLib;
            const pdfDoc = await PDFDocument.load(currentPdfBytes);
            totalPdfPages = pdfDoc.getPageCount();
            
            document.getElementById('totalPages').innerText = totalPdfPages;
            document.getElementById('startPage').value = 1;
            document.getElementById('startPage').max = totalPdfPages;
            document.getElementById('endPage').value = totalPdfPages;
            document.getElementById('endPage').max = totalPdfPages;

            // Update UI
            dropZone.classList.add('hidden');
            document.getElementById('workspaceSection').classList.remove('hidden');
        }

        async function splitPdf() {
            let start = parseInt(document.getElementById('startPage').value);
            let end = parseInt(document.getElementById('endPage').value);

            if (start < 1 || end > totalPdfPages || start > end) {
                alert(`Please enter a valid range between 1 and ${totalPdfPages}.`);
                return;
            }

            const splitBtn = document.getElementById('splitBtn');
            const statusText = document.getElementById('statusText');
            splitBtn.classList.add('hidden');
            statusText.classList.remove('hidden');

            try {
                const { PDFDocument } = PDFLib;
                const originalPdf = await PDFDocument.load(currentPdfBytes);
                const newPdf = await PDFDocument.create();

                // Generate array of page indices (0-based)
                const indices = [];
                for (let i = start - 1; i <= end - 1; i++) {
                    indices.push(i);
                }

                const copiedPages = await newPdf.copyPages(originalPdf, indices);
                copiedPages.forEach((page) => newPdf.addPage(page));

                const splitPdfBytes = await newPdf.save();
                
                const blob = new Blob([splitPdfBytes], { type: "application/pdf" });
                const url = URL.createObjectURL(blob);
                
                document.getElementById('downloadLink').href = url;
                document.getElementById('workspaceSection').classList.add('hidden');
                document.getElementById('downloadSection').classList.remove('hidden');

            } catch (error) {
                console.error(error);
                alert("Error splitting PDF.");
            } finally {
                splitBtn.classList.remove('hidden');
                statusText.classList.add('hidden');
            }
        }

        function resetTool() {
            currentPdfBytes = null;
            fileInput.value = "";
            document.getElementById('workspaceSection').classList.add('hidden');
            document.getElementById('downloadSection').classList.add('hidden');
            dropZone.classList.remove('hidden');
        }
    </script>
</body>
</html>
